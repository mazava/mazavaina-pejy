<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazavaina</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            overflow: hidden;
            font-family: Arial, sans-serif;
            position: relative;
        }

        /* Bouton Quiz */
        .quiz-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .quiz-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.1em;

            text-shadow:
                1px 1px 0 #d1d5db,
                2px 2px 0 #cbd5e1,
                3px 3px 0 #94a3b8,
                4px 4px 0 #64748b,
                5px 5px 0 #475569,
                6px 6px 10px rgba(0,0,0,0.4),
                12px 12px 25px rgba(0,0,0,0.3);

            transform: perspective(800px) rotateX(15deg);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: perspective(800px) rotateX(15deg) translateY(0);
            }
            50% {
                transform: perspective(800px) rotateX(15deg) translateY(-15px);
            }
        }
    </style>
</head>
<body>

    <a href="https://quiz.mazavaina.org" class="quiz-btn">
        🎯 Quiz
    </a>

    <h1>Mazavaina</h1>

</body>
</html>
